analysis:
  mode: single_lap

session:
  year: 2025
  grand_prix: Monza
  session: Q

drivers:
  single: VER

lap_selection:
  mode: fastest
  only_by_time: false
  require_accuracy: true
  exclude_deleted: true
  exclude_generated: true
  quicklaps: true
  green_flag_only: true

alignment:
  distance_step_m: 5.0

segmentation:
  min_braking_zone_length_m: 35.0
  apex_search_lookahead_m: 140.0
  throttle_pickup_threshold: 90.0
  low_throttle_threshold: 15.0
  exit_search_window_m: 180.0
  segment_labels:
    1: "First chicane"
    2: "Roggia"
    3: "Lesmo 1"
    4: "Lesmo 2"
    5: "Ascari"
    6: "Parabolica"

ml:
  enabled: true
  n_clusters: 4
  random_state: 42

paths:
  cache_dir: cache
  outputs_dir: outputs/single_lap/monza_2025_q_ver

envelope:
  enabled: true
  calibrate_from_reference: false
  track_smoothing_window_m: 15.0
  track_step_m: 2.0
  mass_kg: 800
  mu_lat: 1.70
  mu_long: 1.80
  cda_m2: 0.95
  cla_m2: 3.20
  p_max_w: 800000
