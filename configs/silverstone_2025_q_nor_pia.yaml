analysis:
  mode: compare_laps

session:
  year: 2025
  grand_prix: Silverstone
  session: Q

drivers:
  reference: NOR
  comparison: PIA
  single: NOR

lap_selection:
  mode: fastest
  only_by_time: false
  require_accuracy: true
  exclude_deleted: true
  exclude_generated: true
  quicklaps: true
  green_flag_only: true

alignment:
  distance_step_m: 5.0

segmentation:
  min_braking_zone_length_m: 35.0
  apex_search_lookahead_m: 140.0
  throttle_pickup_threshold: 90.0
  low_throttle_threshold: 15.0
  exit_search_window_m: 180.0
  segment_labels: {}

ml:
  enabled: true
  training_drivers: [NOR, PIA, VER, LEC, RUS]
  top_n_laps_per_driver: 8
  n_clusters: 4
  random_state: 42
  cv_folds: 5
  test_size: 0.30
  regression_models: [ridge, random_forest, gradient_boosting]

paths:
  cache_dir: cache
  outputs_dir: outputs/compare_laps/silverstone_2025_q_nor_pia
